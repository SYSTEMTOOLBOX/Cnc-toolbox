function decode64(value){
 const bytes=Uint8Array.from(atob(value),c=>c.charCodeAt(0));
 return new TextDecoder('utf-8').decode(bytes);
}
function validBase(text){
 return typeof text==='string'&&text.includes('<!DOCTYPE html>')&&text.includes('CNC TOOLBOX')&&text.includes('</body>');
}
async function getBase(){
 for(const url of SOURCES){
  try{
   const response=await fetch(url,{cache:'no-store'});
   if(!response.ok)continue;
   const text=await response.text();
   if(validBase(text)){
    try{localStorage.setItem(BASE_KEY,text)}catch(e){}
    return text;
   }
  }catch(e){}
 }
 const saved=localStorage.getItem(BASE_KEY);
 if(validBase(saved))return saved;
 throw new Error('Impossibile caricare la base della Toolbox');
}
function inject(base){
 const css=decode64(CSS64),panel=decode64(HTML64),logic=decode64(JS64);
 if(!base.includes('CNC TOOLBOX ASSISTENTE VOCALE v3.0')){
  base=base.replace('</style>',css+'\n</style>');
  base=base.replace('</body>',panel+'\n<script>'+logic+'<\\/script>\n</body>');
  base=base.replace('STRUMENTI PER L\'OFFICINA CNC · v2.5','STRUMENTI PER L\'OFFICINA CNC · v3.0 VOCALE');
 }
 return base;
}
getBase().then(base=>{
 const completed=inject(base);
 document.open();
 document.write(completed);
 document.close();
}).catch(err=>{
 document.body.innerHTML='<div class="va-loader"><div class="big">⚠️</div><strong>CONNESSIONE NECESSARIA</strong><p>Apri questa versione una prima volta con internet attivo. Poi la Toolbox conserverà la base sul telefono.</p></div>';
 console.error(err);
});
})();
</script>
